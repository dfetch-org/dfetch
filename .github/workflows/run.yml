name: Run

on:
  workflow_call:

permissions:
  contents: read

jobs:

  test-cygwin:
    runs-on: windows-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "Harden the runner (Block egress traffic: Only allow calls to allowed endpoints)"
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >+
            github.com:443
            api.github.com:443
            release-assets.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            community.chocolatey.org:443
            community.chocolatey.org:80
            packages.chocolatey.org:443
            cygwin.com:443
            mirrors.kernel.org:443
            *.dl.sourceforge.net:443
            downloads.sourceforge.net:443
            sourceforge.net:443
            svn.code.sf.net:443
            svn.code.sf.net:3690

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: cygwin/cygwin-install-action@a3d72946b163026bbd0fa9a88379ccbda4bd86bb # master

      - name: Install Subversion (SVN) on Windows
        run: |
          choco install svn -y
          $env:PATH = "C:\Program Files (x86)\Subversion\bin;$env:PATH"
          echo "C:\Program Files (x86)\Subversion\bin" >> $env:GITHUB_PATH
          svn --version  # Verify installation

      - name: Install Zig (Windows)
        run: choco install zig --version=0.15.2 -y

      - name: Install dfetch
        run: pip install .

      - run: dfetch environment
      - run: dfetch environment
      - run: dfetch add https://github.com/dfetch-org/test-repo
      - run: dfetch validate
      - run: dfetch check
      - run: dfetch update
      - run: dfetch update
      - run: dfetch update-patch
      - run: dfetch format-patch
      - run: dfetch report -t sbom
      - run: dfetch remove test-repo
      - name: Dfetch SARIF Check
        uses: ./
        with:
          working-directory: '.'

      - name: Run example
        working-directory: ./example
        env:
          CI: 'false'
        run: |
            dfetch update
            dfetch update
            dfetch report

  run:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        include:
          - platform: ubuntu-latest
            allowed-endpoints: >+
              _http._tcp.azure.archive.ubuntu.com:443
              _https._tcp.archive.ubuntu.com:443
              _https._tcp.dl.google.com:443
              _https._tcp.esm.ubuntu.com:443
              _https._tcp.motd.ubuntu.com:443
              _https._tcp.security.ubuntu.com:443
              0.pool.ntp.org:443
              api.github.com:443
              archive.ubuntu.com:443
              azure.archive.ubuntu.com:443
              azure.archive.ubuntu.com:80
              cfhcable.dl.sourceforge.net:443
              cytranet-dal.dl.sourceforge.net:443
              dl.google.com:443
              downloads.sourceforge.net:443
              esm.ubuntu.com:443
              files.pythonhosted.org:443
              gigenet.dl.sourceforge.net:443
              github.com:443
              motd.ubuntu.com:443
              netactuate.dl.sourceforge.net:443
              pilotfiber.dl.sourceforge.net:443
              psychz.dl.sourceforge.net:443
              pypi.org:443
              release-assets.githubusercontent.com:443
              security.ubuntu.com:443
              sourceforge.net:443
          - platform: macos-latest
            allowed-endpoints: >+
              api.apple-cloudkit.com:443
              api.github.com:443
              files.pythonhosted.org:443
              formulae.brew.sh:443
              gdmf.apple.com:443
              ghcr.io:443
              github.com:443
              init.itunes.apple.com:443
              mask.icloud.com:443
              mesu.apple.com:443
              mirrors.ctan.org:443
              ocsp.sectigo.com:80
              ocsp2.apple.com:443
              pkg-containers.githubusercontent.com:443
              pypi.org:443
              release-assets.githubusercontent.com:443
          - platform: windows-latest
            allowed-endpoints: >+
              _https._tcp.packages.microsoft.com:443
              api.github.com:443
              *.dl.sourceforge.net:443
              community.chocolatey.org:443
              community.chocolatey.org:80
              dc.services.visualstudio.com:443
              downloads.sourceforge.net:443
              fe2cr.update.microsoft.com:443
              files.pythonhosted.org:443
              github.com:443
              mobile.events.data.microsoft.com:443
              packages.chocolatey.org:443
              packages.microsoft.com:443
              pypi.org:443
              release-assets.githubusercontent.com:443
              sourceforge.net:443
              ziglang.org:443
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "Harden the runner (Block egress traffic: Only allow calls to allowed endpoints)"
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: ${{ matrix.allowed-endpoints }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Subversion (SVN)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion
          svn --version  # Verify installation

      - name: Install Subversion (SVN)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install svn
          svn --version  # Verify installation

      - name: Install Subversion (SVN)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install svn -y
          $env:PATH = "C:\Program Files (x86)\Subversion\bin;$env:PATH"
          echo "C:\Program Files (x86)\Subversion\bin" >> $env:GITHUB_PATH
          svn --version  # Verify installation

      - name: Install Zig (Windows)
        if: runner.os == 'Windows'
        run: choco install zig --version=0.15.2 -y

      - name: Install dfetch
        run: pip install .

      - run: dfetch environment
      - run: dfetch add https://github.com/dfetch-org/test-repo
      - run: dfetch validate
      - run: dfetch check
      - run: dfetch update
      - run: dfetch update
      - run: dfetch update-patch
      - run: dfetch format-patch
      - run: dfetch report -t sbom
      - run: dfetch remove test-repo

      - name: Dfetch SARIF Check
        uses: ./
        with:
          working-directory: '.'
