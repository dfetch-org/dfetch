name: Releases

on:
  workflow_call:
    outputs:
      release_id:
        description: "Tag name to use of release, empty if not needed"
        value: ${{ jobs.prepare-release.outputs.release_id }}

permissions:
  contents: read

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write

    outputs:
      release_id: ${{ steps.release_info.outputs.tag }}

    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >+
            github.com:443
            api.github.com:443
            release-assets.githubusercontent.com:443
            uploads.github.com:443
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: true # Required for preparing & creating releases
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Determine release info
        id: release_info
        run: |
              if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
                BRANCH="${GITHUB_HEAD_REF}"
              else
                BRANCH="${GITHUB_REF#refs/heads/}"
              fi

              if [[ "$BRANCH" == "main" ]]; then
                TAG="latest"
              elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                TAG="${GITHUB_REF#refs/tags/}"
              else
                TAG=""
              fi
              echo "tag=$TAG"
              echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Update latest tag
        if: ${{ steps.release_info.outputs.tag == 'latest' }}
        uses: EndBug/latest-tag@b1cbe90391108c0a90c6ee33ba86972cf84574e6
        with:
          ref: latest
          description: Last state in main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        if: ${{ steps.release_info.outputs.tag }}
        id: notes
        run: |
          python script/create_release_notes.py

      - name: Delete existing release
        if: ${{ steps.release_info.outputs.tag == 'latest' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_info.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          else
            echo "No release found for $TAG."
          fi

      - name: Create release
        if: ${{ steps.release_info.outputs.tag }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v2.5.0
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.tag }}
          body_path: release_notes.txt
          draft: true
          files: LICENSE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
