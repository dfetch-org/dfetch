name: Dependabot CycloneDX Hook

on:
  push:
    branches:
      - 'dependabot/pip/*/cyclonedx-python-lib-*'

permissions:
  contents: write

jobs:
  update-feature-file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Run dependabot hook
        run: python script/dependabot_hook.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add features/report-sbom.feature
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update cyclonedx-python-lib version in SBOM feature file"
            git push
          fi
