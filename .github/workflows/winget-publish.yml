name: Publish to WinGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag to publish (e.g. 0.14.2)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish to WinGet
    # For releases: skip the rolling 'latest' tag on main.
    # For manual dispatch: always run (the operator knows what they're doing).
    if: >-
      github.event_name != 'release' ||
      github.event.release.tag_name != 'latest'
    runs-on: ubuntu-latest
    concurrency:
      group: winget-publish-${{ github.event.release.tag_name || inputs.release-tag }}
      cancel-in-progress: true

    environment:
      name: winget
      url: https://github.com/microsoft/winget-pkgs

    steps:
      - name: "Harden the runner (Block egress traffic: Only allow calls to allowed endpoints)"
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >+
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            uploads.github.com:443
            index.crates.io:443
            static.crates.io:443

      - name: Publish to WinGet
        # Requires WINGET_TOKEN secret in the 'winget' environment.
        #
        # Setup — create a fine-grained PAT:
        #   1. GitHub → Settings → Developer settings → Personal access tokens
        #      → Fine-grained tokens → Generate new token
        #   2. Resource owner: DFetch-org
        #   3. Repository access: All repositories
        #      (needed to push the manifest branch to dfetch-org/winget-pkgs)
        #   4. Permissions:
        #        Contents      → Read and write
        #        Pull requests → Read and write
        #   5. Store the token as secret WINGET_TOKEN in:
        #      Repo → Settings → Environments → winget → Environment secrets
        #
        # Prerequisites: dfetch-org/winget-pkgs must exist as a fork of
        # microsoft/winget-pkgs (create it once manually on GitHub).
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: DFetch-org.DFetch
          release-tag: ${{ github.event.release.tag_name || inputs.release-tag }}
          token: ${{ secrets.WINGET_TOKEN }}
          fork-user: dfetch-org
