name: DevContainer

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  devcontainer:
    name: DevContainer Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: "Harden the runner (Block egress traffic: Only allow calls to allowed endpoints)"
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >+
            _http._tcp.deb.debian.org:443
            *.data.mcr.microsoft.com:443
            api.github.com:443
            auth.docker.io:443
            containers.dev:443
            deb.debian.org:443
            deb.debian.org:80
            debian.map.fastlydns.net:443
            debian.map.fastlydns.net:80
            dl.google.com:443
            files.pythonhosted.org:443
            github.com:443
            go.dev:443
            index.rubygems.org:443
            mcr.microsoft.com:443
            nodejs.org:443
            www.plantuml.com:443
            plantuml.com:443
            plantuml.com:80
            production.cloudflare.docker.com:443
            proxy.golang.org:443
            pypi.org:443
            registry-1.docker.io:443
            registry.npmjs.org:443
            rubygems.org:443
            storage.googleapis.com:443

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache Docker layers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/.buildx-cache
          key: devcontainer-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            devcontainer-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build DevContainer image
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          runCmd: |
            echo "Installing test dependencies..."
            pip install -e .[development,docs,casts]

            echo "Running pre-commit checks..."
            pre-commit run --all-files

            echo "Running unit tests..."
            python -m pytest tests

            echo "Building documentation..."
            make -C doc html
            make -C doc/landing-page html
