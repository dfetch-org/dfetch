<svg class="ci-diagram" viewBox="0 0 480 215" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="dfetch update fetches upstream source into the base layer; numbered patches are stacked on top and re-applied in order; dfetch format-patch prepares a patch for upstream PR submission">

  <!-- UPDATE ARROW: upstream box → base layer (drawn first, behind stack layers) -->
  <line x1="153" y1="168" x2="252" y2="168" stroke="#4e7fa0" stroke-width="1.5"/>
  <path d="M 248,163 L 258,168 L 248,173" fill="#4e7fa0" stroke="none"/>
  <text x="197" y="157" text-anchor="middle" dominant-baseline="middle"
        font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#4e7fa0">dfetch update</text>

  <!-- FORMAT-PATCH ARROW: patch 002 → upstream (dashed, drawn before patch layers) -->
  <line x1="247" y1="104" x2="156" y2="104"
        stroke="#c2620a" stroke-width="1.2" stroke-dasharray="4 3"/>
  <path d="M 160,99 L 150,104 L 160,109" fill="#c2620a" stroke="none"/>
  <text x="197" y="93" text-anchor="middle" dominant-baseline="middle"
        font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#c2620a">dfetch format-patch</text>

  <!-- UPSTREAM BOX (drawn after arrows; covers arrow endpoints within box) -->
  <rect x="45" y="83" width="108" height="100" rx="8"
        fill="rgba(78,127,160,0.10)" stroke="#4e7fa0" stroke-width="1.5"/>
  <text x="99" y="103" text-anchor="middle" dominant-baseline="middle"
        font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#4e7fa0">upstream</text>
  <rect x="77" y="115" width="44" height="16" rx="8" fill="rgba(78,127,160,0.18)"/>
  <text x="99" y="123" text-anchor="middle" dominant-baseline="middle"
        font-family="Inter,sans-serif" font-size="8.5" fill="#4e7fa0">v 1.2</text>
  <rect x="64"  y="148" width="10" height="10" rx="2" fill="#4e7fa0" opacity="0.28"/>
  <rect x="79"  y="148" width="10" height="10" rx="2" fill="#4e7fa0" opacity="0.40"/>
  <rect x="94"  y="148" width="10" height="10" rx="2" fill="#4e7fa0" opacity="0.28"/>

  <!-- PATCH STACK — drawn bottom to top so upper layers render on top -->

  <!-- Base: fetched source (covers update arrow tip) -->
  <rect x="257" y="147" width="182" height="44" rx="5"
        fill="#eaf0f7" stroke="#4e7fa0" stroke-width="1.5"/>
  <text x="267" y="160" dominant-baseline="middle"
        font-family="JetBrains Mono,monospace" font-size="8" fill="#4e7fa0" font-weight="500">fetched source  ·  v 1.2</text>
  <text x="267" y="173" dominant-baseline="middle"
        font-family="JetBrains Mono,monospace" font-size="7.5" fill="rgba(78,127,160,0.50)">// 2 342 lines of upstream source</text>
  <text x="267" y="184" dominant-baseline="middle"
        font-family="JetBrains Mono,monospace" font-size="7" fill="rgba(78,127,160,0.30)">// unmodified, tracked by dfetch</text>

  <!-- Patch 001: null-check -->
  <rect x="252" y="115" width="182" height="44" rx="5"
        fill="#fef3e4" stroke="rgba(194,98,10,0.40)" stroke-width="1"/>
  <text x="262" y="128" dominant-baseline="middle"
        font-family="JetBrains Mono,monospace" font-size="7.5" fill="rgba(122,58,10,0.80)" font-weight="500">001-null-check.patch</text>
  <text x="262" y="141" dominant-baseline="middle"
        font-family="JetBrains Mono,monospace" font-size="7.5" fill="#2d6b2d">+  if val is None: return default</text>
  <text x="262" y="152" dominant-baseline="middle"
        font-family="JetBrains Mono,monospace" font-size="7" fill="rgba(45,107,45,0.55)">+  # safety guard added locally</text>

  <!-- Patch 002: fix-timeout (highlighted — ready for upstream) -->
  <rect x="247" y="83" width="182" height="44" rx="5"
        fill="#fde3b8" stroke="#c2620a" stroke-width="1.5"/>
  <text x="257" y="96" dominant-baseline="middle"
        font-family="JetBrains Mono,monospace" font-size="7.5" fill="#7a3a0a" font-weight="500">002-fix-timeout.patch</text>
  <rect x="390" y="86" width="33" height="14" rx="7" fill="#c2620a"/>
  <text x="406" y="93" text-anchor="middle" dominant-baseline="middle"
        font-family="Inter,sans-serif" font-size="7.5" font-weight="600" fill="white">→ PR</text>
  <text x="257" y="109" dominant-baseline="middle"
        font-family="JetBrains Mono,monospace" font-size="7.5" fill="#8b2020">-  TIMEOUT = 5</text>
  <text x="257" y="120" dominant-baseline="middle"
        font-family="JetBrains Mono,monospace" font-size="7.5" fill="#2d6b2d">+  TIMEOUT = 30</text>

  <!-- Patch 003: add-feature (top of stack) -->
  <rect x="242" y="51" width="182" height="44" rx="5"
        fill="#f8d070" stroke="rgba(161,91,10,0.65)" stroke-width="1"/>
  <text x="252" y="64" dominant-baseline="middle"
        font-family="JetBrains Mono,monospace" font-size="7.5" fill="#5c3a00" font-weight="500">003-add-feature.patch</text>
  <text x="252" y="77" dominant-baseline="middle"
        font-family="JetBrains Mono,monospace" font-size="7.5" fill="#2d6b2d">+  feature_flag = True</text>
  <text x="252" y="88" dominant-baseline="middle"
        font-family="JetBrains Mono,monospace" font-size="7.5" fill="#2d6b2d">+  if flag: run_feature()</text>

  <!-- bottom caption -->
  <text x="240" y="207" text-anchor="middle" dominant-baseline="middle"
        font-family="Inter,sans-serif" font-size="8" fill="rgba(28,25,23,0.38)">patches applied in order on every dfetch update · fuzzy matching keeps them clean as upstream evolves</text>
</svg>
