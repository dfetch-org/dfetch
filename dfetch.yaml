manifest:
  version: 0.0

  remotes:
  - name: github
    url-base: https://github.com/

  - name: ctan
    url-base: https://mirrors.ctan.org/

  projects:
  - name: demo-magic
    repo-path: paxtonhare/demo-magic.git
    dst: doc/generate-casts/demo-magic
    src: '*.sh'

  - name: plantuml-c4
    repo-path: plantuml-stdlib/C4-PlantUML.git
    dst: doc/static/uml/styles/plantuml-c4
    src: '*.puml'

  - name: sphinxcontrib.asciinema
    repo-path: divi255/sphinxcontrib.asciinema.git
    dst: doc/_ext/sphinxcontrib_asciinema
    src: sphinxcontrib/asciinema
    patch:
     - doc/_ext/patches/001-autoformat-sphinxcontrib.asciinema.patch
     - doc/_ext/patches/002-fix-options-sphinxcontrib.asciinema.patch

  - name: inter-font
    remote: github
    vcs: archive
    src: web/
    dst: doc/static/fonts/inter
    repo-path: rsms/inter/releases/download/v4.1/Inter-4.1.zip
    ignore:
      - inter.css
      - InterDisplay-*
      - InterVariable*
      - Inter*Italic*
      - Inter-Black*
    integrity:
      hash: sha256:9883fdd4a49d4fb66bd8177ba6625ef9a64aa45899767dde3d36aa425756b11e

  - name: jetbrains-mono-font
    remote: github
    vcs: archive
    src: fonts/webfonts/
    dst: doc/static/fonts/jetbrains-mono
    repo-path: JetBrains/JetBrainsMono/releases/download/v2.304/JetBrainsMono-2.304.zip
    ignore:
      - JetBrainsMono-Bold*
      - JetBrainsMono-Extra*
      - JetBrainsMono-Light*
      - JetBrainsMono-Semi*
      - JetBrainsMono-Thin*
      - JetBrainsMono-*Italic*
    integrity:
      hash: sha256:6f6376c6ed2960ea8a963cd7387ec9d76e3f629125bc33d1fdcd7eb7012f7bbf

  - name: font-awesome
    remote: github
    dst: doc/static/fonts/font-awesome
    repo-path: FortAwesome/Font-Awesome/releases/download/7.2.0/fontawesome-free-7.2.0-web.zip
    ignore:
      - scss*
      - sprites*
      - svg*
      - js
      - metadata
    integrity:
      hash: sha256:218d19fdec1bd898d1c78683f3c72e71bcc9e5f9bb3e065f99a5c3cdc48e0d66

  - name: poiret-one-font
    remote: github
    src: fonts
    dst: doc/static/fonts/poiretone
    branch: master
    repo-path: alexeiva/poiretone.git
    ignore:
    - otf

  - name: tex-gyre-heros-font
    remote: ctan
    vcs: archive
    src: opentype/
    dst: doc/static/fonts/texgyreheros
    repo-path: fonts/tex-gyre.zip
    ignore:
      - texgyreadventor*
      - texgyrebonum*
      - texgyrechorus*
      - texgyrecursor*
      - texgyreheroscn*
      - texgyrepagella*
      - texgyreschola*
      - texgyretermes*
    integrity:
      hash: sha256:1773c470f9e388e087b68e3426e115af2cd236845a7e05ceb25b2a503409a7a3
